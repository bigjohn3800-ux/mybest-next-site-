<style>
:root{--ink:#23284A;--vio:#6C5CE7;--mint:#00CEC9;--sun:#FDCB6E;--bg:#F4F5FB;--navy:#1B2A4A;--muted:#5C617C;--line:#E7E6F2}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Pretendard,-apple-system,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
.wrap{max-width:1180px;margin:0 auto;padding:18px}
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.logo{font-weight:800;letter-spacing:.08em;color:var(--vio)}.logo span{color:var(--mint)}
.rolebadge{font-size:12px;font-weight:800;background:#EEE9FF;color:var(--vio);border-radius:999px;padding:5px 12px}
.spacer{flex:1}
.btn{border:0;border-radius:11px;padding:11px 16px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;background:linear-gradient(90deg,var(--vio),#8E7CF3);color:#fff}
.btn.ghost{background:#fff;color:var(--vio);border:1.5px solid #DAD4FB}
.btn.sm{padding:7px 12px;font-size:12.5px;border-radius:9px}
.btn.navy{background:var(--navy)}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px}
.notice{background:#FBFAF7;border:1px solid #E7E4DA;border-radius:14px;padding:13px 14px;margin-bottom:14px;font-size:12.5px;line-height:1.6;color:#5B6270}
.notice b{color:var(--navy)}
input,select{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;font-family:inherit;font-size:14px;background:#fff}
input:focus,select:focus{outline:none;border-color:var(--vio)}
label{font-size:12px;font-weight:700;color:var(--muted);display:block;margin:0 0 5px 2px}
/* login */
.login{max-width:380px;margin:8vh auto}
.login h1{font-size:22px;margin-bottom:4px}.login .sub{font-size:13px;color:var(--muted);margin-bottom:18px}
.err{background:#FFF0F0;color:#C62828;border-radius:9px;padding:9px 12px;font-size:13px;margin-bottom:10px;display:none}
/* dashboard */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
.stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center}
.stat .v{font-size:25px;font-weight:800;color:var(--navy)}

.filters{display:grid;grid-template-columns:repeat(4,1fr) auto;gap:10px;align-items:end}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#F3F1FD;color:var(--navy);text-align:left;padding:10px;font-size:12px;font-weight:800;position:sticky;top:0}
td{padding:9px 10px;border-bottom:1px solid #F0EFF7}
tr:hover td{background:#FAF9FF}
.pbar{height:8px;border-radius:4px;background:#ECEAFB;overflow:hidden;min-width:90px;display:inline-block;vertical-align:middle}
.pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--vio),var(--mint))}
.tag{display:inline-block;font-size:10.5px;font-weight:800;border-radius:999px;padding:2px 8px}
.tag.paid{background:#E7F8EE;color:#1E8E4E}.tag.free{background:#FFF4DC;color:#A8893E}
.tablewrap{max-height:60vh;overflow:auto;border:1px solid var(--line);border-radius:12px}
.muted{color:var(--muted)}
/* modal */
.modal{position:fixed;inset:0;background:rgba(20,18,50,.45);display:none;align-items:flex-start;justify-content:center;padding:30px 14px;overflow:auto;z-index:50}
.modal.open{display:flex}
.sheet{background:#fff;border-radius:16px;max-width:760px;width:100%;padding:22px}
.atrow{border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:10px}

.kv{font-size:12.5px;line-height:1.7}
/* class report */
.rep{max-width:820px;margin:0 auto}
.rep .rhead{display:flex;align-items:flex-start;gap:12px;border-bottom:3px solid var(--vio);padding-bottom:12px;margin-bottom:16px}

.rbar .nm{width:108px;flex-shrink:0;font-weight:700;color:var(--navy)}

.rbar .tr i{display:block;height:100%;background:linear-gradient(90deg,var(--vio),var(--mint))}
.rbar .vn{width:80px;text-align:right;flex-shrink:0;color:var(--muted);font-weight:700}

.repnote{font-size:11.5px;color:var(--muted);line-height:1.6;margin-top:4px}
.rtbl td,.rtbl th{font-size:12px;padding:7px 8px}
/* multi-class comparison */
.cmpwrap{margin-bottom:14px}
.cmpwrap .sechead{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cmpwrap .sechead h3{font-size:15px;color:var(--navy)}
.cmpwrap .sechead .spacer{flex:1}
.cmptbl th{cursor:pointer;user-select:none;white-space:nowrap}
.cmptbl th.sortable:hover{background:#EAE6FB}
.cmptbl th .arrow{font-size:9px;color:var(--vio);margin-left:2px}
.cmptbl td.num,.cmptbl th.num{text-align:right}
.cmptbl td.cls{font-weight:800;color:var(--navy)}
.cmptbl tr.totalrow td{background:#F3F1FD;font-weight:800;border-top:2px solid #D8D2F6}
.minibar{height:7px;border-radius:4px;background:#ECEAFB;overflow:hidden;width:64px;display:inline-block;vertical-align:middle;margin-right:6px}
.minibar i{display:block;height:100%;background:linear-gradient(90deg,var(--vio),var(--mint))}
.kpi6{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;margin-bottom:12px}
.kpi6 .stat .v{font-size:22px}
.nudge{display:flex;flex-wrap:wrap;gap:14px}
.nudge .col{flex:1;min-width:230px}
.nudge .col h4{font-size:13px;color:var(--navy);margin-bottom:7px}
.nudge .col h4 .cnt{font-size:11px;background:#FFF0F0;color:#C0392B;border-radius:999px;padding:2px 8px;margin-left:6px;font-weight:800}
.nudge .col.low h4 .cnt{background:#FFF4DC;color:#9A7B2E}
@media(max-width:780px){.stats{grid-template-columns:repeat(2,1fr)}.kpi6{grid-template-columns:repeat(2,1fr)}.filters{grid-template-columns:1fr 1fr}.rstats{grid-template-columns:repeat(2,1fr)}.rbar .nm{width:80px}.nudge{flex-direction:column}}

 @page{margin:14mm}

 .tablewrap{max-height:none!important;overflow:visible!important;border:none}
 .rtbl tr,.cmptbl tr{break-inside:avoid;page-break-inside:avoid}
 .cmpwrap .sechead .noprint{display:none!important}
 thead{display:table-header-group}
 .repnote{break-inside:avoid}
}
@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation:none!important;transition:none!important;scroll-behavior:auto!important}}

    <div class="tablewrap" style="max-height:46vh"><table class="cmptbl" id="cmpTbl"></table></div>
    <div class="repnote">※ /overview 응답을 학급별로 집계 — 완료율=1종 이상 응시 학생 비율, 5종+율=5종 이상 완료 학생 비율, 평균완료=1인당 완료 진단 수. 머리글을 눌러 정렬.</div>

function exportCsv(){
 const rows=S.rows||[];
 const studentNo=(r,i)=>r.student_no||r.no||r.number||String(i+1).padStart(2,'0');
 const head=['학번','이름','학교','학급','학년','진행(완료/14)','총응시','최근활동','상태'];
 const esc2=x=>'"'+String(x==null?'':x).replace(/"/g,'""')+'"';
 const lines=[head.map(esc2).join(',')].concat(rows.map((r,i)=>[studentNo(r,i),r.name,r.school||'',r.class_name||'',r.grade||'',r.done+'/'+r.total,r.attempts,r.last_at?r.last_at.slice(0,10):'',r.plan==='paid'?'운영':'기본'].map(esc2).join(',')));
 const blob=new Blob(['﻿'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
 const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='mybest_students_'+new Date().toISOString().slice(0,10)+'.csv';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
}
async function exportResultCsv(){
 const rows=S.rows||[];if(!rows.length){alert('내보낼 학생이 없습니다.');return}
 const esc2=x=>'"'+String(x==null?'':x).replace(/"/g,'""')+'"';
 const studentNo=(r,i)=>r.student_no||r.no||r.number||String(i+1).padStart(2,'0');
 const head=['학번','이름','학교','학급','학년','진단','응시일','핵심결과','진행상태'];
 const lines=[head.map(esc2).join(',')];
 for(let i=0;i<rows.length;i++){
  const r=rows[i];
  try{
   const j=await api('/student',{token:S.token,student_id:r.id});
   (j.attempts||[]).forEach(a=>lines.push([studentNo(r,i),r.name,r.school||'',r.class_name||'',r.grade||'',TITLES[a.test_slug]||a.test_slug,a.created_at?a.created_at.slice(0,10):'',summarize(a.test_slug,a.result).replace(/<[^>]+>/g,''),(r.done||0)+'/'+(r.total||14)].map(esc2).join(',')));
  }catch(e){}
 }
 const blob=new Blob(['﻿'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
 const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='mybest_result_values_'+new Date().toISOString().slice(0,10)+'.csv';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
}
async function loadDash(){

// ── 학교단위 KPI + 학급별 비교 (웨이브4-D) ──
function aggClasses(rows){
 // /overview students[] 를 학급(class_name+school) 단위로 집계
 const m=new Map();
 rows.forEach(r=>{
  const key=(r.school||'')+'|'+(r.class_name||'(미지정)');
  let g=m.get(key);
  if(!g){g={key,school:r.school||'-',cls:r.class_name||'(미지정)',grade:r.grade||'',n:0,done:0,attempts:0,active:0,c5:0};m.set(key,g);}
  g.n++; g.done+=(r.done||0); g.attempts+=(r.attempts||0);
  if((r.done||0)>=1)g.active++;
  if((r.done||0)>=5)g.c5++;
  if(!g.grade&&r.grade)g.grade=r.grade;
 });
 return [...m.values()].map(g=>({
  ...g,
  avgDone:g.n?Math.round((g.done/g.n)*10)/10:0,
  rate:g.n?Math.round((g.active/g.n)*100):0,
  c5rate:g.n?Math.round((g.c5/g.n)*100):0
 }));
}
function renderCompare(rows,summary){
 const card=$('#cmpCard'),kc=$('#kpi6');
 if(!card)return;
 // school/super 만 노출 (teacher=단일학급이면 비교 의미 적음)
 const groups=aggClasses(rows);
 const multi=(S.role==='super'||S.role==='school')&&groups.length>=2;
 if(!multi||!rows.length){card.style.display='none';if(kc)kc.style.display='none';S.cmp=null;return;}
 // KPI 6칸 (학교 전체 요약)
 const s=summary||{};
 const totalN=rows.length;
 const totalAtt=rows.reduce((a,r)=>a+(r.attempts||0),0);
 const totalDone=rows.reduce((a,r)=>a+(r.done||0),0);
 const active=rows.filter(r=>(r.done||0)>=1).length;
 const c5=rows.filter(r=>(r.done||0)>=5).length;
 const avgDone=totalN?Math.round((totalDone/totalN)*10)/10:0;
 const kpi=[['학급 수',groups.length],['총 학생',totalN],['총 응시',totalAtt],['참여율(1종+)',(totalN?Math.round(active/totalN*100):0)+'%'],['평균 완료',avgDone],['5종+ 완료',c5]];
 if(kc){kc.style.display='grid';kc.innerHTML=kpi.map(([l,v])=>`<div class="stat"><div class="v">${v}</div><div class="l">${esc(l)}</div></div>`).join('');}
 card.style.display='';
 S.cmp={groups,sort:{key:'avgDone',dir:-1}};
 sortCompare(S.cmp.sort.key,true);
}
function sortCompare(key,keepDir){
 if(!S.cmp)return;
 const st=S.cmp.sort;
 if(keepDir){st.key=key;}
 else{if(st.key===key)st.dir*=-1;else{st.key=key;st.dir=(key==='cls'||key==='school')?1:-1;}}
 const num=!(key==='cls'||key==='school');
 const g=[...S.cmp.groups].sort((a,b)=>{
  let x=a[key],y=b[key];
  if(num){x=+x;y=+y;return (x-y)*st.dir;}
  return String(x).localeCompare(String(y),'ko')*st.dir;
 });
 const arrow=k=>st.key===k?(st.dir<0?' ▾':' ▴'):'';
 const tot={n:g.reduce((a,r)=>a+r.n,0),attempts:g.reduce((a,r)=>a+r.attempts,0),done:g.reduce((a,r)=>a+r.done,0),c5:g.reduce((a,r)=>a+r.c5,0)};
 const totRate=tot.n?Math.round(g.reduce((a,r)=>a+r.active,0)/tot.n*100):0;
 const totAvg=tot.n?Math.round((tot.done/tot.n)*10)/10:0;
 const totC5=tot.n?Math.round(tot.c5/tot.n*100):0;
 const head=`<thead><tr>
   <th class="cls" onclick="sortCompare('cls')">학급${arrow('cls')}</th>
   <th onclick="sortCompare('school')">학교${arrow('school')}</th>
   <th class="num" onclick="sortCompare('n')">학생수${arrow('n')}</th>
   <th class="num" onclick="sortCompare('attempts')">총응시${arrow('attempts')}</th>
   <th class="num" onclick="sortCompare('avgDone')">평균완료${arrow('avgDone')}</th>
   <th class="num" onclick="sortCompare('rate')">완료율${arrow('rate')}</th>
   <th class="num" onclick="sortCompare('c5rate')">5종+율${arrow('c5rate')}</th></tr></thead>`;
 const bar=p=>`<span class="minibar"><i style="width:${Math.max(2,Math.min(100,p))}%"></i></span>`;
 const body='<tbody>'+g.map(r=>`<tr>
   <td class="cls">${esc(r.cls)}</td>
   <td>${esc(r.school)}</td>
   <td class="num">${r.n}</td>
   <td class="num">${r.attempts}</td>
   <td class="num">${r.avgDone}</td>
   <td class="num">${bar(r.rate)}${r.rate}%</td>
   <td class="num">${bar(r.c5rate)}${r.c5rate}%</td></tr>`).join('')+
  `<tr class="totalrow"><td class="cls">전체 (${g.length}학급)</td><td>-</td><td class="num">${tot.n}</td><td class="num">${tot.attempts}</td><td class="num">${totAvg}</td><td class="num">${totRate}%</td><td class="num">${totC5}%</td></tr></tbody>`;
 $('#cmpTbl').innerHTML=head+body;
 const h=$('#cmpHint');if(h)h.textContent=`${g.length}개 학급 · 머리글 클릭 정렬`;
}

function renderNudge(rows){
 const card=$('#nudgeCard');if(!card)return;
 const multi=(S.role==='super'||S.role==='school');
 const none=rows.filter(r=>(r.done||0)===0);
 const low=rows.filter(r=>{const d=r.done||0;return d>=1&&d<=2;});
 if(!multi||(!none.length&&!low.length)){card.style.display='none';return;}
 const byClass=(arr)=>{const m=new Map();arr.forEach(r=>{const k=r.class_name||'(미지정)';(m.get(k)||m.set(k,[]).get(k)).push(r);});return m;};
 const col=(title,cls,arr)=>{
  if(!arr.length)return '';
  const m=byClass(arr);
  let inner='';
  for(const [k,list] of m){inner+=`<div style="margin-bottom:7px"><b style="font-size:12px;color:var(--navy)">${esc(k)}</b> <span class="muted" style="font-size:11px">${list.length}명</span><div class="chips" style="margin-top:3px">${list.map(r=>`<span class="chip ${cls==='low'?'':'warn'}">${esc(r.name)}${cls==='low'?' · '+(r.done||0)+'종':''}</span>`).join('')}</div></div>`;}
  return `<div class="col ${cls}"><h4>${title}<span class="cnt">${arr.length}명</span></h4>${inner}</div>`;
 };
 card.style.display='';
 $('#nudge').innerHTML=col('미응시(0종)','none',none)+col('저참여(1~2종)','low',low);
}
function summarize(slug,r){
 if(!r)return '';
 if(r.kind==='series'||r.kind==='future'){const labels=r.kind==='future'?FUT:(r.labels||SER);const best=labels[r.best],second=labels[r.second];return `대표: <b>${esc(best)}</b>${second?` · 2순위 ${esc(second)}`:''}`;}
 if(r.kind==='grades'){return (r.subjects||[]).map((s,i)=>`${esc(s)} ${r.grades[i]}등급`).join(' · ');}
 if(r.kind==='pick'){return `선택 계열: <b>${esc((r.labels||SER)[(r.pick||1)-1])}</b>`;}
 if(r.kind==='checklist'||r.kind==='bucketcheck'){const weak=(r.kind==='bucketcheck'?(r.weakBuckets||[]).map(b=>(r.names||[])[b]):[]).filter(Boolean);return `준비도 <b>${r.pct}%</b> (${r.ready}/${r.total})${weak.length?` · 보완: ${weak.map(esc).join(', ')}`:''}`;}
 return '결과 있음';
}

function uploadBulkExcel(ev){

  try{

   const sheet=wb.Sheets[wb.SheetNames[0]];
   const rows=XLSX.utils.sheet_to_json(sheet,{header:1});
   const names=rows.map(r=>String((r&&r[0])??'').trim()).filter(n=>n&&n!=='이름'&&n.toLowerCase()!=='name');

   const ta=$('#bkNames');
   const existing=ta.value.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
   ta.value=[...existing,...names].join('\n');
   ta.dispatchEvent(new Event('input'));
   alert(names.length+'명을 엑셀에서 불러왔습니다. 등록 전에 명단을 확인해주세요.');

 };
 reader.readAsArrayBuffer(file);
}

  <button class="btn" style="width:100%" onclick="doChangePassword(${isReset?`'${targetUsername}'`:'null'})">저장</button>
  <div id="pwResult" style="margin-top:10px"></div>`;
 $('#modal').classList.add('open');
}
async function doChangePassword(targetUsername){
 const n1=$('#pwNew')?.value||'',n2=$('#pwNew2')?.value||'';
 if(n1.length<4){$('#pwResult').innerHTML='<div class="err" style="display:block">새 비밀번호는 4자 이상이어야 합니다.</div>';return}
 if(n1!==n2){$('#pwResult').innerHTML='<div class="err" style="display:block">새 비밀번호가 일치하지 않습니다.</div>';return}
 const body={token:S.token,new_password:n1};
 if(targetUsername)body.target_username=targetUsername;else body.old_password=$('#pwOld')?.value||'';
 $('#pwResult').innerHTML='<div class="muted" style="font-size:12.5px">저장 중…</div>';
 const j=await api('/change_password',body);
 if(j.error){$('#pwResult').innerHTML=`<div class="err" style="display:block">${esc(j.error)}</div>`;return}
 $('#pwResult').innerHTML='<div class="notice" style="background:#F2FBF5;border-color:#CDEBD7">비밀번호가 변경되었습니다.</div>';
}

// ── 관리자 계정 관리 (super 전용) ──
function adminTopbar(active){
 return `<div class="topbar noprint"><div class="logo">MY BEST <span>NEXT</span></div>
  <span class="rolebadge">${esc(S.name||'관리자')}</span><div class="spacer"></div>
  <button class="btn ${active==='dash'?'':'ghost'} sm" onclick="viewDash()">📊 대시보드</button>
  ${S.role==='super'?`<button class="btn ${active==='admins'?'':'ghost'} sm" onclick="viewAdmins()">👤 관리자 계정</button>`:''}
  ${(S.role==='super'||S.role==='school')?`<button class="btn ${active==='accounts'?'':'ghost'} sm" onclick="viewAccounts()">👪 학부모 회원</button>`:''}
  ${(S.role==='super'||S.role==='school')?`<button class="btn ${active==='billing'?'':'ghost'} sm" onclick="viewBilling()">💳 매출·구독</button>`:''}
  <button class="btn ghost sm" onclick="openChangePassword()">🔑 비밀번호</button>
  <button class="btn navy sm" onclick="logout()">로그아웃</button></div>`;
}
async function viewAdmins(){
 if(S.role!=='super'){alert('권한이 없습니다.');return}
 $('#app').innerHTML=`<div class="wrap">${adminTopbar('admins')}
  <div class="card noprint" style="display:flex;justify-content:space-between;align-items:center">
   <div><b>관리자 계정 관리</b><div class="muted" style="font-size:12px;margin-top:3px">최고관리자(super)·학교관리자(school)·담임(teacher) 계정을 추가·수정·삭제합니다.</div></div>
   <button class="btn sm" onclick="openAdminForm()">➕ 새 관리자 추가</button></div>
  <div class="tablewrap"><table><thead><tr><th>아이디</th><th>이름</th><th>역할</th><th>범위</th><th>생성일</th><th></th></tr></thead><tbody id="admTbody"><tr><td colspan="6" class="muted" style="text-align:center;padding:20px">불러오는 중…</td></tr></tbody></table></div>
 </div>
 <div class="modal" id="modal" onclick="if(event.target.id==='modal')closeModal()"><div class="sheet" id="sheet"></div></div>`;
 loadAdmins();
}
const ROLE_LABEL={super:'최고관리자',school:'학교관리자',teacher:'담임/학급관리자'};
async function loadAdmins(){
 const j=await api('/admins_list',{token:S.token});
 if(j.error){$('#admTbody').innerHTML=`<tr><td colspan="6" class="err" style="display:table-cell">${esc(j.error)}</td></tr>`;return}
 S.admins=j.admins||[];
 $('#admTbody').innerHTML=S.admins.length?S.admins.map(a=>`<tr>
   <td><b>${esc(a.username)}</b></td><td>${esc(a.display_name||'-')}</td><td>${esc(ROLE_LABEL[a.role]||a.role)}</td><td>${esc(a.scope||'-')}</td>
   <td class="muted">${a.created_at?a.created_at.slice(0,10):'-'}</td>
   <td style="white-space:nowrap">
    <button class="btn ghost sm" onclick="openAdminForm('${a.id}')">수정</button>
    <button class="btn ghost sm" onclick="openChangePassword('${esc(a.username)}')">비번초기화</button>
    <button class="btn ghost sm" onclick="doAdminDelete('${a.id}','${esc(a.username)}')">삭제</button></td></tr>`).join('')
  :`<tr><td colspan="6" class="muted" style="text-align:center;padding:24px">등록된 관리자가 없습니다</td></tr>`;
}
function openAdminForm(id){
 const admin=id?(S.admins||[]).find(x=>String(x.id)===String(id)):null;
 const isEdit=!!admin;
 $('#sheet').innerHTML=`<div class="topbar"><h2 style="font-size:19px">${isEdit?'✏️ 관리자 수정':'➕ 새 관리자 추가'}</h2><div class="spacer"></div><button class="btn navy sm" onclick="closeModal()">닫기</button></div>
  ${isEdit?'':'<label>아이디</label><input id="admUser" placeholder="로그인 아이디"><div style="height:8px"></div><label>초기 비밀번호</label><input id="admPass" type="password"><div style="height:8px"></div>'}
  <label>이름(표시명)</label><input id="admName" value="${isEdit?esc(admin.display_name||''):''}">
  <div style="height:8px"></div>
  <label>역할</label><select id="admRole">
   <option value="teacher"${(!isEdit||admin.role==='teacher')?' selected':''}>담임/학급관리자</option>
   <option value="school"${isEdit&&admin.role==='school'?' selected':''}>학교관리자</option>
   <option value="super"${isEdit&&admin.role==='super'?' selected':''}>최고관리자</option>
  </select>
  <div style="height:8px"></div>
  <label>범위(scope, 학교명/학급코드 · 선택)</label><input id="admScope" value="${isEdit?esc(admin.scope||''):''}" placeholder="school=학교명 일부 · teacher=학급코드">
  <div style="height:14px"></div>
  <button class="btn" style="width:100%" onclick="doAdminSave(${isEdit?`'${admin.id}'`:'null'})">저장</button>
  <div id="admResult" style="margin-top:10px"></div>`;
 $('#modal').classList.add('open');
}
async function doAdminSave(id){
 const display_name=($('#admName')?.value||'').trim();
 const role=$('#admRole')?.value||'teacher';
 const scope=($('#admScope')?.value||'').trim();
 $('#admResult').innerHTML='<div class="muted" style="font-size:12.5px">저장 중…</div>';
 let j;
 if(id){
  j=await api('/admin_update',{token:S.token,id,display_name,role,scope:scope||null});
 }else{
  const username=($('#admUser')?.value||'').trim();
  const password=$('#admPass')?.value||'';
  if(!username||!password){$('#admResult').innerHTML='<div class="err" style="display:block">아이디와 초기 비밀번호를 입력하세요.</div>';return}
  j=await api('/admin_create',{token:S.token,username,password,role,scope:scope||null,display_name});
 }
 if(j.error){$('#admResult').innerHTML=`<div class="err" style="display:block">${esc(j.error)}</div>`;return}
 $('#admResult').innerHTML='<div class="notice" style="background:#F2FBF5;border-color:#CDEBD7">저장되었습니다.</div>';
 loadAdmins();
}
async function doAdminDelete(id,username){
 if(!confirm(`관리자 '${username}' 계정을 삭제하시겠습니까?`))return;
 const j=await api('/admin_delete',{token:S.token,id});
 if(j.error){alert('삭제 실패: '+j.error);return}
 loadAdmins();
}

// ── 학부모/보호자 회원 조회 ──
async function viewAccounts(){
 if(S.role!=='super'&&S.role!=='school'){alert('권한이 없습니다.');return}
 $('#app').innerHTML=`<div class="wrap">${adminTopbar('accounts')}
  <div class="card noprint"><b>학부모·보호자 회원 조회</b><div class="muted" style="font-size:12px;margin-top:3px">학습자 앱(mybest) 자체 회원가입 계정(myb_accounts) 목록입니다.</div></div>
  <div class="tablewrap"><table><thead><tr><th>역할</th><th>이름</th><th>이메일</th><th>전화</th><th>연결학생</th><th>가입일</th><th>최근로그인</th><th>상태</th></tr></thead><tbody id="acTbody"><tr><td colspan="8" class="muted" style="text-align:center;padding:20px">불러오는 중…</td></tr></tbody></table></div>
 </div>
 <div class="modal" id="modal" onclick="if(event.target.id==='modal')closeModal()"><div class="sheet" id="sheet"></div></div>`;
 loadAccounts();
}
async function loadAccounts(){
 const j=await api('/accounts_list',{token:S.token});
 if(j.error){$('#acTbody').innerHTML=`<tr><td colspan="8" class="err" style="display:table-cell">${esc(j.error)}</td></tr>`;return}
 const rows=j.accounts||[];
 $('#acTbody').innerHTML=rows.length?rows.map(a=>`<tr>
   <td>${esc(a.role||'-')}</td><td>${esc(a.display_name||'-')}</td><td>${esc(a.email||'-')}</td><td>${esc(a.phone||'-')}</td>
   <td class="muted" style="font-size:11px">${esc(a.student_id||'-')}</td>
   <td class="muted">${a.created_at?a.created_at.slice(0,10):'-'}</td>
   <td class="muted">${a.last_login_at?a.last_login_at.slice(0,10):'-'}</td>
   <td>${esc(a.status||'-')}</td></tr>`).join('')
  :`<tr><td colspan="8" class="muted" style="text-align:center;padding:30px">아직 가입한 학부모·보호자 회원이 없습니다.</td></tr>`;
}

// ── 매출·구독·만료·사용량 위젯 + 세금계산서 (super/school) ──
const PLAN_LABEL={class40:'학급 플랜',class100:'학년 플랜'};
function won(n){return (n||0).toLocaleString('ko-KR')+'원'}
async function viewBilling(){
 if(S.role!=='super'&&S.role!=='school'){alert('권한이 없습니다.');return}
 $('#app').innerHTML=`<div class="wrap">${adminTopbar('billing')}
  <div class="card noprint"><b>매출·구독 현황</b><div class="muted" style="font-size:12px;margin-top:3px">결제·이용권·만료·사용량 요약과 세금계산서 요청을 관리합니다.</div></div>
  <div id="widgetGrid" class="qualitygrid" style="margin-bottom:14px"><div class="muted">불러오는 중…</div></div>
  <div class="card noprint" style="display:flex;justify-content:space-between;align-items:center">
   <b>세금계산서 요청 내역</b><div class="muted" style="font-size:11.5px">결제완료 주문만 표시됩니다. 발행은 운영자가 외부 계산서 서비스로 처리 후 "발행완료"로 표시합니다.</div></div>
  <div class="tablewrap"><table><thead><tr><th>주문번호</th><th>학급</th><th>요금제</th><th>금액</th><th>결제일</th><th>계산서 상태</th><th></th></tr></thead><tbody id="taxTbody"><tr><td colspan="7" class="muted" style="text-align:center;padding:20px">불러오는 중…</td></tr></tbody></table></div>
 </div>
 <div class="modal" id="modal" onclick="if(event.target.id==='modal')closeModal()"><div class="sheet" id="sheet"></div></div>`;
 loadBillingWidgets(); loadTaxInvoices();
}
async function loadBillingWidgets(){
 const j=await api('/billing_widgets',{token:S.token});
 if(j.error){$('#widgetGrid').innerHTML=`<div class="err" style="display:block">${esc(j.error)}</div>`;return}
 const planRows=Object.entries(j.subscriptions.by_plan||{}).map(([k,v])=>`${esc(PLAN_LABEL[k]||k)} ${v}개`).join(' · ')||'없음';
 const expD1=(j.expiring.d1||[]).length, expD7=(j.expiring.d7||[]).length;
 $('#widgetGrid').innerHTML=`
  <div class="quality"><span class="qbadge ready">매출</span><h3>${won(j.revenue.total_paid)}</h3><p>누적 결제 ${j.revenue.total_paid_count}건 · 이번달 ${won(j.revenue.this_month)}(${j.revenue.this_month_count}건)</p></div>
  <div class="quality"><span class="qbadge ready">구독/이용권</span><h3>활성 ${j.subscriptions.active_count} / 전체 ${j.subscriptions.total_classes}</h3><p>${esc(planRows)}</p></div>
  <div class="quality"><span class="qbadge ${expD1?'build':'ready'}">만료 알림</span><h3>D-1: ${expD1}건 · D-7: ${expD7}건</h3><p>${expD7?(j.expiring.d7.map(c=>esc(c.name)+'('+c.expires_at+')').join(', ')):'임박 만료 없음'}</p></div>
  <div class="quality"><span class="qbadge ready">사용량</span><h3>최근30일 ${j.usage.attempts_30d}건</h3><p>누적 응시 ${j.usage.attempts_total}건</p></div>`;
}
async function loadTaxInvoices(){
 const j=await api('/tax_invoice_list',{token:S.token});
 if(j.error){$('#taxTbody').innerHTML=`<tr><td colspan="7" class="err" style="display:table-cell">${esc(j.error)}</td></tr>`;return}
 S.taxOrders=j.orders||[];
 const statusLabel={none:'미요청',requested:'요청됨',issued:'발행완료'};
 $('#taxTbody').innerHTML=S.taxOrders.length?S.taxOrders.map(o=>`<tr>
   <td style="font-size:11px">${esc(o.order_id)}</td><td>${o.class?esc(o.class.name):'-'}</td><td>${esc(PLAN_LABEL[o.plan]||o.plan)}</td>
   <td>${won(o.amount)}</td><td class="muted">${o.paid_at?o.paid_at.slice(0,10):'-'}</td>
   <td>${esc(statusLabel[o.tax_invoice_status]||o.tax_invoice_status)}</td>
   <td style="white-space:nowrap">
    ${o.tax_invoice_status==='none'?`<button class="btn ghost sm" onclick="openTaxRequestForm('${o.order_id}')">요청 등록</button>`:''}
    ${o.tax_invoice_status==='requested'&&S.role==='super'?`<button class="btn sm" onclick="doTaxIssue('${o.order_id}')">발행완료 처리</button>`:''}
   </td></tr>`).join('')
  :`<tr><td colspan="7" class="muted" style="text-align:center;padding:24px">결제완료 주문이 없습니다</td></tr>`;
}
function openTaxRequestForm(orderId){
 $('#sheet').innerHTML=`<div class="topbar"><h2 style="font-size:19px">🧾 세금계산서 요청 등록</h2><div class="spacer"></div><button class="btn navy sm" onclick="closeModal()">닫기</button></div>
  <label>사업자명(상호)</label><input id="taxBizName" placeholder="예: OO중학교">
  <div style="height:8px"></div>
  <label>사업자등록번호</label><input id="taxBizRegNo" placeholder="000-00-00000">
  <div style="height:8px"></div>
  <label>계산서 수신 이메일</label><input id="taxBizEmail" placeholder="example@school.kr">
  <div style="height:14px"></div>
  <button class="btn" style="width:100%" onclick="doTaxRequest('${orderId}')">요청 등록</button>
  <div id="taxResult" style="margin-top:10px"></div>`;
 $('#modal').classList.add('open');
}
async function doTaxRequest(orderId){
 const biz_name=($('#taxBizName')?.value||'').trim();
 const biz_reg_no=($('#taxBizRegNo')?.value||'').trim();
 const biz_email=($('#taxBizEmail')?.value||'').trim();
 if(!biz_name||!biz_reg_no||!biz_email){$('#taxResult').innerHTML='<div class="err" style="display:block">모든 항목을 입력하세요.</div>';return}
 const j=await api('/tax_invoice_request',{token:S.token,order_id:orderId,biz_name,biz_reg_no,biz_email});
 if(j.error){$('#taxResult').innerHTML=`<div class="err" style="display:block">${esc(j.error)}</div>`;return}
 closeModal(); loadTaxInvoices();
}
async function doTaxIssue(orderId){
 if(!confirm('이 주문을 세금계산서 발행완료로 표시하시겠습니까? (실제 발행은 외부 계산서 서비스에서 먼저 처리하세요)'))return;
 const j=await api('/tax_invoice_issue',{token:S.token,order_id:orderId});
 if(j.error){alert('처리 실패: '+j.error);return}
 loadTaxInvoices();
}

if(S.token)viewDash();else viewLogin();
</script>
</body></html>
