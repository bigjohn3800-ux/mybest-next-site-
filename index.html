async function startQuiz(slug){
 const q=await api('/questions?slug='+slug);
 S.quiz={slug,scale:q.scale,questions:q.questions,answers:[],i:0,t:S.tests[slug]};
 try{
  const sv=JSON.parse(localStorage.getItem('myb_q_'+slug)||'null');
  if(sv&&sv.i>0&&sv.i<q.questions.length&&confirm(`이전에 ${sv.i}번까지 답한 기록이 있어요.\n이어서 할까요? (취소=처음부터)`)){S.quiz.answers=sv.answers;S.quiz.i=sv.i;}
  else localStorage.removeItem('myb_q_'+slug);
 }catch(e){}
 go('quiz');
}
function quizPrev(){const z=S.quiz;if(z&&z.i>0){z.i--;renderQuiz();}}

 const z=S.quiz,v=$('#view'),q=z.questions[z.i],total=z.questions.length;
 let opts;
 if(z.slug==='hs_essay'&&z.i===0){
  opts=['외고·국제고','자사고','영재학교·과학고','특성화고·마이스터고'].map((o,k)=>`<button class="opt" onclick="answer(${k+1})">${o}</button>`).join('');
 }else if(z.scale==='grade'){
  opts=['1등급 (상위 10%)','2등급','3등급','4등급','5등급'].map((o,k)=>`<button class="opt" onclick="answer(${k+1})">${o}</button>`).join('');

 $('#view').innerHTML='<div class="card" style="text-align:center;padding:50px">분석 중… 🔮</div>';

async function buyPlan(plan){

  const cfg=window._paycfg;
  if(!cfg.ready){alert('아직 결제 준비 모드입니다.\n관리자가 토스페이먼츠 상점 키를 등록하면 활성화됩니다.');return}

    <div class="card"><div class="k">최근 주문</div>${st.recent_orders.length?`<table><tr><th>주문번호</th><th>플랜</th><th>금액</th><th>상태</th></tr>${st.recent_orders.map(o=>`<tr><td style="font-size:10.5px">${o.order_id}</td><td>${o.plan}</td><td>${o.amount.toLocaleString()}원</td><td>${o.status}</td></tr>`).join('')}</table>`:'<p class="muted">주문 없음</p>'}</div>`;
   }
  }catch(e){}
  $('#ablocks').innerHTML=d.blocks.map(b=>`<div class="card"><div class="k">#${b.id} · gu${b.gu_no} · ${esc(b.section)} · ${esc(b.cond_key)}</div>
  <input id="bt${b.id}" value="${esc(b.title)}">
  <textarea id="bb${b.id}" style="width:100%;min-height:90px;padding:12px;border:2px solid #ECEAFB;border-radius:12px;font-family:inherit;font-size:13.5px">${esc(b.body)}</textarea>
  <button class="btn small navy" style="margin-top:8px" onclick="saveBlock(${b.id})">저장</button> <span class="muted" id="bs${b.id}"></span></div>`).join('');
 }catch(e){showErr(e.message)}
}
async function saveBlock(id){
 try{
  await api('/admin/block_update',{pin:window._apin,id,title:$('#bt'+id).value,body:$('#bb'+id).value,tips:undefined});
  $('#bs'+id).textContent='저장됨 ✓';
 }catch(e){alert(e.message)}
}
(async()=>{
 const q=new URLSearchParams(location.search);
 if(q.get('pay')==='ok'&&q.get('paymentKey')){
  try{
   const r=await fetch(PAYAPI+'/confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({paymentKey:q.get('paymentKey'),orderId:q.get('orderId'),amount:+q.get('amount')})}).then(x=>x.json());
   alert(r.ok?('결제 완료! '+(r.plan||'')+' 적용 · '+(r.expires_at||'')+'까지 이용 가능'):('결제 승인 실패: '+(r.error||'')));
  }catch(e){alert('승인 처리 오류: '+e.message)}
  history.replaceState(null,'',location.pathname);
 }else if(q.get('pay')==='fail'){alert('결제가 취소되었거나 실패했습니다.');history.replaceState(null,'',location.pathname);}
 go('home');
})();
</script></body></html>
