 add(WIZ_INTEREST_SLUGS[WIZ.interest],100,'interest');
 add(WIZ_WORRY_SLUGS[WIZ.worry],40,'worry');
 /* 고3는 입시·진학 진단에 보너스 */
 if(WIZ.grade==='hs3'){['roadmap','interview','hs_essay','subject_rec','track_fit'].forEach(sl=>{if(t[sl]&&wizFitsLevel(t[sl],'hs')&&score[sl]!=null)score[sl]+=15;});}
 let picks=Object.keys(score).sort((a,b)=>score[b]-score[a]);

function mypLevel(distinct,catN,retakes){
 const tiers=[
  {min:0,title:'탐색 시작',icon:'🌱',desc:'첫 진단으로 여정을 시작해요'},
  {min:1,title:'첫걸음 탐험가',icon:'🧭',desc:'나를 알아가는 중'},
  {min:3,title:'성장 탐험가',icon:'🚀',desc:'여러 영역을 탐색하는 중'},
  {min:5,title:'진로 항해사',icon:'⛵',desc:'방향이 또렷해지고 있어요'},
  {min:8,title:'마스터 탐험가',icon:'🏆',desc:'폭넓은 자기이해를 갖췄어요'},
  {min:12,title:'레전드',icon:'👑',desc:'거의 모든 영역을 정복!'}
 ];
 /* 점수 = 완료 진단수 + 영역 다양성 보너스 + 재진단 보너스 */
 const score=distinct+Math.max(0,catN-1)+retakes;
 let i=0;for(let k=0;k<tiers.length;k++){if(score>=tiers[k].min)i=k;}
 const cur=tiers[i],nx=tiers[i+1];
 const pct=nx?Math.min(100,Math.round((score-cur.min)/(nx.min-cur.min)*100)):100;
 const need=nx?Math.max(0,nx.min-score):0;
 return {level:i,title:cur.title,icon:cur.icon,desc:cur.desc,pct,next:nx?`진단 ${need}개 더 (또는 새 영역·재진단)`:null};
}

/* ===== 공유 시트(B7) — navigator.share 미지원 시 채널 선택(스레드·X·카톡(복사)·링크복사) ===== */
function ogShareSheet(text,url,title){
 const old=$('#ogsheet');if(old)old.remove();
 const full=text+' '+url;
 const sh=document.createElement('div');sh.id='ogsheet';sh.className='ogsheet';
 sh.innerHTML=`<div class="ogcard"><div class="oghd">${esc(title||'공유하기')}</div>
  <div class="oggrid">
   <button class="ogbtn" data-act="thread">🧵<span>스레드</span></button>
   <button class="ogbtn" data-act="x">𝕏<span>X</span></button>
   <button class="ogbtn" data-act="kakao">💬<span>카톡(복사)</span></button>
   <button class="ogbtn" data-act="copy">🔗<span>링크 복사</span></button>
  </div>
  <button class="btn ghost" data-act="close" style="margin-top:6px">닫기</button></div>`;
 sh.addEventListener('click',e=>{
  if(e.target===sh){sh.remove();return;}
  const b=e.target.closest('[data-act]');if(!b)return;const act=b.dataset.act;
  if(act==='thread'){window.open('https://www.threads.net/intent/post?text='+encodeURIComponent(full),'_blank','noopener');}
  else if(act==='x'){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(url),'_blank','noopener');}
  else if(act==='kakao'){ogCopy(full,'카카오톡 채팅창에 붙여넣어 보내세요!');}
  else if(act==='copy'){ogCopy(full,'링크가 복사되었어요!');}
  if(act!=='close')sh.remove();else sh.remove();
 });
 document.body.appendChild(sh);
}
function ogCopy(t,msg){
 try{navigator.clipboard.writeText(t).then(()=>alert(msg||'복사되었어요!'),()=>prompt('아래 내용을 복사하세요',t));}
 catch(e){prompt('아래 내용을 복사하세요',t);}
}
