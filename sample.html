 {slug:'es_habit',grade:'초등',purpose:'공부',num:2},
 {slug:'value_work',grade:'초등',purpose:'진로',num:3},

 {slug:'ai_inquiry',grade:'초등',purpose:'역량',num:6},

 {slug:'ai_inquiry',grade:'중등',purpose:'역량',num:7},
 {slug:'hs_series',grade:'고등',purpose:'진로',num:1},
 {slug:'subject_rec',grade:'고등',purpose:'진학',num:2},

async function init(){
 const j=await fetch(API+'/api/tests',{headers:{apikey:KEY}}).then(r=>r.json()).catch(()=>({tests:{}}));
 TESTS=j.tests||{};
 const usedG=GRADES.filter(g=>PLACEMENTS.some(p=>p.grade===g&&TESTS[p.slug]));
 const g=['전체',...usedG];
 $('#chips').innerHTML='<span class="chiplabel">학년</span>'+g.map(c=>`<button class="chip ${c===GRADE?'on':''}" onclick="setGrade('${c}')">${esc(c)}</button>`).join('');
 const p=['전체',...PURPOSES];
 $('#chips2').innerHTML='<span class="chiplabel">목적</span>'+p.map(c=>`<button class="chip ${c===PURPOSE?'on':''}" onclick="setPurpose('${c}')">${esc(c)}</button>`).join('');
 render();
}
function setGrade(c){GRADE=c;$('#chips').querySelectorAll('.chip').forEach(e=>e.classList.toggle('on',e.textContent===c));render();}
function setPurpose(c){PURPOSE=c;$('#chips2').querySelectorAll('.chip').forEach(e=>e.classList.toggle('on',e.textContent===c));render();}
function cardHtml(k,t,label){return `<div class="cardx" onclick="openSample('${k}')">
   <div class="emo">${EMO[k]||'📊'}</div><h3>${label?'<span class="numbadge">'+esc(label)+'</span>':''}${esc(t.title)}</h3><p>${esc(t.desc)}</p>

function render(){
 const groups=(GRADE==='전체'?GRADES:[GRADE]).filter(g=>PLACEMENTS.some(p=>p.grade===g&&TESTS[p.slug]));
 let html='';
 groups.forEach(g=>{
  const items=PLACEMENTS
   .filter(p=>p.grade===g&&TESTS[p.slug])
   .filter(p=>PURPOSE==='전체'||p.purpose===PURPOSE)
   .sort((a,b)=>a.num-b.num);
  if(!items.length)return;
  html+=`<div class="gsec"><span class="gtag" style="background:${GTAG[g]||'var(--vio)'}">${esc(g)}</span><h2>${esc(g)} 진단</h2><span class="gcount">${items.length}종</span></div>`;
  html+=`<div class="grid">${items.map(p=>cardHtml(p.slug,TESTS[p.slug],g+' '+p.num)).join('')}</div>`;
 });
 if(!html)html='<div class="empty">해당 분류의 진단이 없습니다. 다른 학년/목적을 선택해 보세요.</div>';
 $('#sections').innerHTML=html;
}
function radar(labels,scores,best){
 setTimeout(()=>{const ctx=$('#chart');if(!ctx||!window.Chart)return;if(chart)chart.destroy();
  chart=new Chart(ctx,{type:'radar',data:{labels,datasets:[{data:scores,backgroundColor:'rgba(108,92,231,.18)',borderColor:'#6C5CE7',pointBackgroundColor:labels.map((_,i)=>i===best?'#FDCB6E':'#6C5CE7'),pointRadius:labels.map((_,i)=>i===best?6:3),borderWidth:2}]},
   options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{r:{beginAtZero:true,ticks:{display:false},pointLabels:{font:{size:12,weight:'700'}}}}}});},40);
}
function bars(labels,vals,max){return `<div class="bars">${labels.map((l,i)=>`<div class="brow"><span class="lab">${esc(l)}</span><span class="bar"><i style="width:${Math.round(vals[i]/max*100)}%"></i></span><b>${vals[i]}</b></div>`).join('')}</div>`;}

async function openSample(slug){
 const t=TESTS[slug]||{};
 $('#sheet').innerHTML='<div style="padding:34px;text-align:center" class="muted">샘플 불러오는 중…</div>';

 let bodyHtml='';
 if(!r){bodyHtml=`<div class="muted" style="padding:10px">이 진단의 샘플은 곧 공개됩니다. 지금 바로 체험해 보실 수 있어요!</div>`;}
 else if(r.kind==='series'||r.kind==='future'){const labels=r.kind==='future'?FUT:(r.labels||SER);const best=labels[r.best];
   bodyHtml=`<div class="chartwrap"><canvas id="chart"></canvas></div><div style="text-align:center;font-size:14px"><b>${esc(best)}</b> 성향이 가장 높게 나타난 샘플이에요</div>`;radar(labels,r.scores||[],r.best);}
 else if(r.kind==='grades'){bodyHtml=bars(r.subjects||[],(r.grades||[]).map(g=>6-g),5)+`<div class="muted" style="font-size:12px">막대가 길수록 강한 과목 (등급 환산 샘플)</div>`;}
 else if(r.kind==='bucketcheck'){const names=r.names||[];const per=r.per||[];bodyHtml=`<div style="text-align:center;font-size:30px;font-weight:800;color:var(--navy)">${r.pct}점</div><div style="text-align:center" class="muted">${r.ready}/${r.total} 항목 준비</div>`+bars(names,per.map(p=>p.ok),Math.max(1,...per.map(p=>p.total)));}
 else if(r.kind==='checklist'){bodyHtml=`<div style="text-align:center;font-size:34px;font-weight:800;color:var(--navy)">${r.pct}점</div><div style="text-align:center" class="muted">${r.ready}/${r.total} 항목 준비 — 약점별 보완 가이드가 제공됩니다</div>`;}
 else if(r.kind==='pick'){bodyHtml=`<div style="text-align:center;font-size:18px"><b>${esc((r.labels||SER)[(r.pick||1)-1])}</b> 계열 추천 과목 조합 샘플</div>`;}
 else bodyHtml=`<div class="muted">샘플 결과</div>`;
